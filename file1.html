<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Sync | Timer & Countdown</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --danger: #fb7185;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .card {
            background: var(--card);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin-bottom: 2rem;
            text-align: center;
        }

        h2 { margin-top: 0; color: var(--accent); }

        /* Countdown Styles */
        #exam-timer {
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            justify-content: space-around;
        }

        .unit { font-size: 0.8rem; color: #94a3b8; display: block; }

        /* Pomodoro Styles */
        .timer-display {
            font-size: 4rem;
            font-weight: 800;
            margin: 1rem 0;
            font-variant-numeric: tabular-nums;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .start { background: var(--accent); color: var(--bg); }
        .reset { background: #475569; color: white; }
        
        input[type="date"] {
            background: #334155;
            border: 1px solid var(--accent);
            color: white;
            padding: 5px;
            border-radius: 4px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h2>Exam Countdown</h2>
            <input type="date" id="exam-date" onchange="updateTargetDate()">
            <div id="exam-timer">
                <div><span id="days">00</span><span class="unit">Days</span></div>
                <div><span id="hours">00</span><span class="unit">Hours</span></div>
                <div><span id="mins">00</span><span class="unit">Mins</span></div>
            </div>
        </div>

        <div class="card">
            <h2>Pomodoro Study Timer</h2>
            <div id="status">Focus Time</div>
            <div class="timer-display" id="pomodoro-display">25:00</div>
            <div class="btn-group">
                <button class="start" onclick="toggleTimer()" id="start-btn">Start</button>
                <button class="reset" onclick="resetTimer()">Reset</button>
            </div>
        </div>
    </div>

    <script>
        // --- Exam Countdown Logic ---
        let targetDate = new Date();
        targetDate.setDate(targetDate.getDate() + 7); // Default to 7 days from now

        function updateTargetDate() {
            const val = document.getElementById('exam-date').value;
            if(val) targetDate = new Date(val);
        }

        function updateCountdown() {
            const now = new Date();
            const diff = targetDate - now;

            if (diff <= 0) {
                document.getElementById('exam-timer').innerHTML = "Exam Day!";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / 1000 / 60) % 60);

            document.getElementById('days').innerText = d.toString().padStart(2, '0');
            document.getElementById('hours').innerText = h.toString().padStart(2, '0');
            document.getElementById('mins').innerText = m.toString().padStart(2, '0');
        }

        // --- Pomodoro Logic ---
        let timeLeft = 25 * 60;
        let timerId = null;
        let isRunning = false;

        function updatePomodoroDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('pomodoro-display').innerText = 
                `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function toggleTimer() {
            const btn = document.getElementById('start-btn');
            if (isRunning) {
                clearInterval(timerId);
                btn.innerText = "Start";
            } else {
                timerId = setInterval(() => {
                    timeLeft--;
                    updatePomodoroDisplay();
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        alert("Time's up! Take a break.");
                        resetTimer();
                    }
                }, 1000);
                btn.innerText = "Pause";
            }
            isRunning = !isRunning;
        }

        function resetTimer() {
            clearInterval(timerId);
            isRunning = false;
            timeLeft = 25 * 60;
            updatePomodoroDisplay();
            document.getElementById('start-btn').innerText = "Start";
        }

        // Initialize
        setInterval(updateCountdown, 1000);
        updatePomodoroDisplay();
    </script>
</body>
</html>
